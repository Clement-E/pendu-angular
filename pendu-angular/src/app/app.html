<main>
  <div class="playground">
    <app-pendu-area
      [errors]="errors()"
      [isWon]="isWon()"
      class="zone-pendu"
    />
    <app-zone-enigme
      [mots]="mots()"
      [guesses]="guesses()"
      [isGameOver]="isGameOver()"
      class="zone-enigme"
    />
    <app-proposition-area
      [guess]="guess()"
      [handleGuessValidate]="handleGuessValidate"
      [isGameOver]="isGameOver()"
      [reset]="reset"
      class="zone-proposition"
    />
  </div>
</main>

<router-outlet />
